<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">

    <title>Frontend Mentor | Social links profile</title>
</head>
<body>

<main class="main-container">
    <section class="profile">
        <picture>
            <img src="assets/images/avatar-jessica.jpeg" alt="Jessica's profile picture" class="profile-picture">
        </picture>
        <div class="profile-summary">
            <h1 class="name">Jessica Randall</h1>
            <p class="location">London, United Kingdom</p>
            <q class="moto">Front-end developer and avid reader.</q>
        </div>

    </section>
    <section class="social-networks">
        <a href="#" class="social-network" tabindex="1">GitHub</a>
        <a href="#" class="social-network" tabindex="2">Frontend Mentor</a>
        <a href="#" class="social-network" tabindex="3">LinkedIn</a>
        <a href="#" class="social-network" tabindex="4">Twitter</a>
        <a href="#" class="social-network" tabindex="5">Instagram</a>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
